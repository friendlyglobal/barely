name: Signed release candidate

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  signed-release:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Verify Gradle wrapper identity
        run: echo "b3a875ddc1f044746e1b1a55f645584505f4a10438c1afea9f15e92a7c42ec13  gradle/wrapper/gradle-wrapper.jar" | sha256sum --check
      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: "17"
      - uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1
      - name: Install Android SDK
        run: sdkmanager --channel=3 "platforms;android-37.0" "build-tools;37.0.0"
      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
      - name: Restore signing key
        env:
          BARELY_KEYSTORE_BASE64: ${{ secrets.BARELY_KEYSTORE_BASE64 }}
        run: |
          test -n "$BARELY_KEYSTORE_BASE64"
          printf '%s' "$BARELY_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/barely-production.jks"
          chmod 600 "$RUNNER_TEMP/barely-production.jks"
      - name: Build and verify signed artifacts
        env:
          BARELY_KEYSTORE_FILE: ${{ runner.temp }}/barely-production.jks
          BARELY_KEYSTORE_PASSWORD: ${{ secrets.BARELY_KEYSTORE_PASSWORD }}
          BARELY_KEY_ALIAS: ${{ secrets.BARELY_KEY_ALIAS }}
          BARELY_KEY_PASSWORD: ${{ secrets.BARELY_KEY_PASSWORD }}
        run: scripts/verify-release.sh
      - name: Upload signed candidate
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: barely-signed-release
          if-no-files-found: error
          path: dist/
          retention-days: 3
