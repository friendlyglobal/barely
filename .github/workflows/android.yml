name: Android verification

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: android-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: android-actions/setup-android@v3
      - name: Install Android SDK
        run: sdkmanager "platforms;android-37" "build-tools;37.0.0"
      - uses: gradle/actions/setup-gradle@v4
      - name: Verify debug and optimized release builds
        run: ./gradlew testDebugUnitTest lintDebug assembleDebug assembleRelease bundleRelease
      - name: Upload reports and unsigned release candidates
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: barely-verification
          if-no-files-found: warn
          path: |
            app/build/reports/
            app/build/test-results/
            app/build/outputs/apk/release/
            app/build/outputs/bundle/release/
          retention-days: 14
