name: Android verification

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: android-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Verify Gradle wrapper identity
        run: echo "b3a875ddc1f044746e1b1a55f645584505f4a10438c1afea9f15e92a7c42ec13  gradle/wrapper/gradle-wrapper.jar" | sha256sum --check
      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: "17"
      - uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1
      - name: Install Android SDK
        run: sdkmanager --channel=3 "platforms;android-37.0" "build-tools;37.0.0"
      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
      - name: Verify debug and optimized release builds
        run: ./gradlew testDebugUnitTest lintDebug assembleDebug assembleRelease bundleRelease
      - name: Upload reports and unsigned release candidates
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: barely-verification
          if-no-files-found: warn
          path: |
            app/build/reports/
            app/build/test-results/
            app/build/outputs/apk/release/
            app/build/outputs/bundle/release/
          retention-days: 14
